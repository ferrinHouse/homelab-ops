---
# Loki tuning for Raspberry Pi (ARM64)
# Optimizing for low memory footprint, single-node setup

# Configuration for the SingleBinary pod itself
loki:
  deploymentMode: SingleBinary
  commonConfig:
    replication_factor: 1
  auth_enabled: false
  storage:
    type: filesystem
    filesystem:
      chunks_directory: /var/lib/loki/chunks
      rules_directory: /var/lib/loki/rules
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h

# Dedicated config for the single binary deployment
singleBinary:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1024Mi
  persistence:
    enabled: true
    storageClass: "nfs-client"
    size: 50Gi

# Disable resource-heavy distributed caching (not needed for simple Pi setups)
chunksCache:
  enabled: false
resultsCache:
  enabled: false

# Re-enable Canary but with tiny resources because the chart validates its presence
lokiCanary:
  enabled: true
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 50m
      memory: 64Mi

# Gateway provides HTTP endpoint (as used in Alloy config)
gateway:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
